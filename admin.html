<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Oldham Brothers Iftar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E5A3;
            --emerald: #0A6847;
            --emerald-deep: #054A31;
            --bg-dark: #0A0F0D;
            --bg-section: #0D1512;
            --bg-card: #132820;
            --text-primary: #F5F1E8;
            --text-secondary: #B8C4BE;
            --text-muted: #7A8A82;
            --border: rgba(212, 175, 55, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s ease;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Login Screen */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(10, 104, 71, 0.2) 0%, transparent 60%),
                var(--bg-dark);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .login-card h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .login-card h1 span {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            margin-bottom: 16px;
            transition: var(--transition);
        }

        .login-card input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--emerald), var(--emerald-deep));
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid rgba(10, 104, 71, 0.5);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(10, 104, 71, 0.3);
        }

        .login-error {
            color: #E74C3C;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            min-height: 100vh;
        }

        .dashboard.active {
            display: block;
        }

        .login-screen.hidden {
            display: none;
        }

        /* Top Bar */
        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .topbar-title span {
            color: var(--gold);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-refresh,
        .btn-logout {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-refresh {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .btn-refresh:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        .btn-logout {
            background: rgba(231, 76, 60, 0.1);
            color: #E74C3C;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .btn-logout:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        /* Dashboard Content */
        .dashboard-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--emerald));
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Table */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .table-header .search-input {
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            width: 250px;
            transition: var(--transition);
        }

        .table-header .search-input:focus {
            border-color: var(--gold);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 14px 24px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 14px 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: rgba(212, 175, 55, 0.03);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .ticket-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.05em;
        }

        .no-data {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-muted);
        }

        .no-data svg {
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .no-data p {
            font-size: 1rem;
        }

        .last-updated {
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Export button */
        .btn-export {
            padding: 8px 16px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-export:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .topbar {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .table-header {
                flex-direction: column;
                gap: 12px;
            }

            .table-header .search-input {
                width: 100%;
            }

            .dashboard-content {
                padding: 20px 16px;
            }

            thead th,
            tbody td {
                padding: 10px 14px;
                font-size: 0.8rem;
            }

            .login-card {
                padding: 32px 24px;
            }
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>🌙 <span>Admin Portal</span></h1>
            <p>Oldham Brothers Iftar Gathering</p>
            <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
            <input type="password" id="adminPassword" placeholder="Enter admin password" autofocus>
            <button onclick="login()">Access Dashboard</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="topbar-title">🌙 <span>Iftar Admin</span> Dashboard</div>
            <div class="topbar-actions">
                <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="dashboard-content">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalRegistrations">0</div>
                    <div class="stat-label">Total Registrations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="todayRegistrations">0</div>
                    <div class="stat-label">Registered Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="eventDate">3</div>
                    <div class="stat-label">Days Until Event</div>
                </div>
            </div>

            <!-- Registrations Table -->
            <div class="table-container">
                <div class="table-header">
                    <h2>Registered Attendees</h2>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email..."
                            oninput="filterTable()">
                        <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
                    </div>
                </div>
                <div id="tableBody">
                    <div class="no-data">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
                        </svg>
                        <p>No registrations yet</p>
                    </div>
                </div>
                <div class="last-updated" id="lastUpdated"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'iftar2026';
        let allRegistrations = [];

        // Login
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.add('active');
                sessionStorage.setItem('adminAuth', 'true');
                loadData();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }

        // Enter key on password field
        document.getElementById('adminPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });

        // Logout
        function logout() {
            sessionStorage.removeItem('adminAuth');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        // Check auth on load
        if (sessionStorage.getItem('adminAuth') === 'true') {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.add('active');
            loadData();
        }

        // Load data from API
        async function loadData() {
            try {
                const response = await fetch('api.php?action=stats');
                const data = await response.json();

                if (data.success) {
                    allRegistrations = data.registrations;
                    updateStats(data);
                    renderTable(data.registrations);
                    document.getElementById('lastUpdated').textContent =
                        'Last updated: ' + new Date().toLocaleTimeString();
                }
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }

        // Update stat cards
        function updateStats(data) {
            document.getElementById('totalRegistrations').textContent = data.total;

            // Count today's registrations
            const today = new Date().toISOString().split('T')[0];
            const todayCount = data.registrations.filter(r =>
                r.registeredAt && r.registeredAt.startsWith(today)
            ).length;
            document.getElementById('todayRegistrations').textContent = todayCount;

            // Days until event (March 10, 2026)
            const eventDate = new Date('2026-03-10');
            const now = new Date();
            const diffTime = eventDate - now;
            const diffDays = Math.max(0, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));
            document.getElementById('eventDate').textContent = diffDays;
        }

        // Render table
        function renderTable(registrations) {
            const container = document.getElementById('tableBody');

            if (registrations.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                        </svg>
                        <p>No registrations yet</p>
                    </div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Ticket ID</th>
                            <th>Registered</th>
                        </tr>
                    </thead>
                    <tbody>`;

            // Show newest first
            const sorted = [...registrations].reverse();
            sorted.forEach((reg, index) => {
                const date = reg.registeredAt ? new Date(reg.registeredAt).toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                }) : 'N/A';

                html += `
                    <tr>
                        <td style="color: var(--text-muted)">${registrations.length - index}</td>
                        <td style="font-weight: 500; color: var(--text-primary)">${escapeHtml(reg.name)}</td>
                        <td>${escapeHtml(reg.phone)}</td>
                        <td>${escapeHtml(reg.email)}</td>
                        <td><span class="ticket-badge">${escapeHtml(reg.ticketId)}</span></td>
                        <td style="color: var(--text-muted)">${date}</td>
                    </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Search/filter
        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) {
                renderTable(allRegistrations);
                return;
            }
            const filtered = allRegistrations.filter(r =>
                r.name.toLowerCase().includes(query) ||
                r.email.toLowerCase().includes(query) ||
                r.phone.includes(query) ||
                r.ticketId.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        // Export to CSV
        function exportCSV() {
            if (allRegistrations.length === 0) return;

            let csv = 'No,Name,Phone,Email,Ticket ID,Registered At\n';
            allRegistrations.forEach((reg, i) => {
                csv += `${i + 1},"${reg.name}","${reg.phone}","${reg.email}","${reg.ticketId}","${reg.registeredAt}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'iftar_registrations.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (sessionStorage.getItem('adminAuth') === 'true') {
                loadData();
            }
        }, 30000);
    </script>
</body>

</html>
